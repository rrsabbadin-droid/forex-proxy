<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOREX.AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
.hdr{background:#0f172a;border-bottom:1px solid #1e293b;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:17px;font-weight:800;color:#60a5fa}
.logo-sub{font-family:monospace;font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase}
.sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stime{color:#64748b;font-size:10px;font-family:monospace;margin-left:8px}
.pgrid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#1e293b;border-bottom:1px solid #1e293b}
@media(max-width:900px){.pgrid{grid-template-columns:repeat(3,1fr)}.main{grid-template-columns:1fr!important}.side{display:none!important}}
.pc{background:#0f172a;padding:9px 12px;cursor:pointer;transition:background .15s;position:relative;overflow:hidden;border-top:2px solid transparent}
.pc:hover{background:#1e293b}
.pc.active.bullish{background:#0f2d1a;border-top-color:#22c55e}
.pc.active.bearish{background:#2d1a1a;border-top-color:#ef4444}
.pc.active.neutro{background:#1e3a5f;border-top-color:#3b82f6}
.psen{position:absolute;top:5px;right:5px;font-size:7px;font-family:monospace;font-weight:700;letter-spacing:1px;padding:1px 4px;border-radius:3px}
.psen.BULLISH{background:rgba(34,197,94,.15);color:#22c55e}
.psen.BEARISH{background:rgba(239,68,68,.15);color:#ef4444}
.psen.NEUTRO{background:rgba(148,163,184,.15);color:#94a3b8}
.pname{font-family:monospace;font-size:10px;font-weight:700;color:#94a3b8}
.pprice{font-family:monospace;font-size:13px;font-weight:700;color:#e2e8f0;margin:2px 0}
.pchg{font-family:monospace;font-size:9px;font-weight:700}
.pchg.up{color:#22c55e}.pchg.down{color:#ef4444}
.main{display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 125px);min-height:500px}
.chat{display:flex;flex-direction:column;border-right:1px solid #1e293b}
.chdr{padding:10px 16px;border-bottom:1px solid #1e293b;background:#0f172a;display:flex;align-items:center;justify-content:space-between}
.ctitle{font-size:10px;font-weight:700;color:#64748b;letter-spacing:2px;text-transform:uppercase;font-family:monospace}
.cbadge{font-family:monospace;font-size:11px;font-weight:700;color:#60a5fa;background:rgba(59,130,246,.1);padding:3px 10px;border-radius:4px;border:1px solid rgba(59,130,246,.2)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.av.ai{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.av.me{background:#1e293b;color:#94a3b8;font-family:monospace;font-size:9px;font-weight:700}
.bbl{max-width:82%;background:#1e293b;border-radius:8px;padding:9px 13px;font-size:13px;line-height:1.6;color:#cbd5e1;border:1px solid #2d3f55}
.msg.u .bbl{background:#1e3a5f;border-color:rgba(59,130,246,.3);color:#bfdbfe}
.tdots{display:flex;align-items:center;gap:4px;padding:4px 0}
.td{width:6px;height:6px;border-radius:50%;background:#60a5fa;animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.inp{padding:10px 14px;border-top:1px solid #1e293b;background:#0f172a;display:flex;gap:8px;align-items:center}
.vbtn{width:38px;height:38px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.vbtn:hover{background:#2d3f55;border-color:#3b82f6;color:#60a5fa}
.vbtn.rec{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444;animation:glow 1s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(239,68,68,.3)}50%{box-shadow:0 0 15px rgba(239,68,68,.6)}}
.cinp{flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 13px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s}
.cinp:focus{border-color:#3b82f6}
.cinp::placeholder{color:#475569}
.sbtn{width:38px;height:38px;border-radius:8px;border:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;cursor:pointer;font-size:15px;transition:opacity .2s;flex-shrink:0}
.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.4;cursor:not-allowed}
.side{display:flex;flex-direction:column;background:#0f172a;overflow-y:auto}
.ssec{padding:13px 15px;border-bottom:1px solid #1e293b}
.slbl{font-family:monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#475569;margin-bottom:8px}
.mi{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e293b}
.mi:last-child{border-bottom:none}
.mn{color:#64748b;font-family:monospace;font-size:10px}
.mv{color:#e2e8f0;font-family:monospace;font-size:11px;font-weight:700}
.mv.up{color:#22c55e}.mv.dn{color:#ef4444}
.qbtns{display:flex;flex-direction:column;gap:5px}
.qbtn{background:#1e293b;border:1px solid #2d3f55;border-radius:6px;padding:7px 11px;color:#94a3b8;font-size:11px;cursor:pointer;text-align:left;transition:all .15s}
.qbtn:hover{background:#2d3f55;color:#60a5fa;border-color:rgba(59,130,246,.3)}
.spkbtn{background:none;border:1px solid #334155;border-radius:4px;padding:2px 7px;color:#64748b;font-size:10px;cursor:pointer;font-family:monospace;margin-top:6px;display:inline-block}
.spkbtn:hover{border-color:#8b5cf6;color:#a78bfa}
.vind{display:none;align-items:center;gap:6px;padding:5px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;font-family:monospace;font-size:10px;color:#ef4444;margin:0 14px 6px}
.vind.on{display:flex}
.wb{display:flex;gap:2px;align-items:center}
.wb div{width:2px;background:#ef4444;border-radius:1px;animation:wb .8s infinite ease-in-out}
.wb div:nth-child(1){height:10px}.wb div:nth-child(2){height:16px;animation-delay:.1s}.wb div:nth-child(3){height:20px;animation-delay:.2s}.wb div:nth-child(4){height:14px;animation-delay:.3s}.wb div:nth-child(5){height:8px;animation-delay:.1s}
@keyframes wb{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.ttsb{display:none;align-items:center;gap:6px;padding:5px 12px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:6px;font-family:monospace;font-size:10px;color:#a78bfa;margin:0 14px 6px}
.ttsb.on{display:flex}
.stts{margin-left:auto;background:none;border:1px solid rgba(139,92,246,.4);border-radius:4px;color:#a78bfa;font-size:9px;padding:2px 5px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <div>
      <div class="logo-text">FOREX.AI</div>
      <div class="logo-sub">Análise Fundamentalista</div>
    </div>
  </div>
  <div style="display:flex;align-items:center">
    <div class="sdot"></div>
    <span class="stime" id="clk">--:--:-- UTC</span>
  </div>
</div>
<div class="pgrid" id="pg"></div>
<div class="main">
  <div class="chat">
    <div class="chdr">
      <span class="ctitle">Terminal de Análise</span>
      <span class="cbadge" id="badge">Selecione um par</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="vind" id="vind"><div class="wb"><div></div><div></div><div></div><div></div><div></div></div><span>Ouvindo...</span></div>
    <div class="ttsb" id="ttsb"><span>Falando...</span><button class="stts" id="stts">PARAR</button></div>
    <div class="inp">
      <button class="vbtn" id="vbtn">🎙️</button>
      <input class="cinp" id="cinp" type="text" placeholder="Pergunte sobre qualquer par ou mercado...">
      <button class="sbtn" id="sbtn">➤</button>
    </div>
  </div>
  <div class="side">
    <div class="ssec">
      <div class="slbl">Macro Global</div>
      <div class="mi"><span class="mn">FED FUNDS</span><span class="mv">5.25%</span></div>
      <div class="mi"><span class="mn">BCE RATE</span><span class="mv">4.00%</span></div>
      <div class="mi"><span class="mn">BOE RATE</span><span class="mv">5.25%</span></div>
      <div class="mi"><span class="mn">BOJ RATE</span><span class="mv">0.10%</span></div>
      <div class="mi"><span class="mn">SNB RATE</span><span class="mv">1.50%</span></div>
      <div class="mi"><span class="mn">US CPI YoY</span><span class="mv dn">3.4%</span></div>
      <div class="mi"><span class="mn">US NFP</span><span class="mv up">+175K</span></div>
      <div class="mi"><span class="mn">DXY INDEX</span><span class="mv up">104.8</span></div>
      <div class="mi"><span class="mn">VIX</span><span class="mv">13.2</span></div>
      <div class="mi"><span class="mn">OIL WTI</span><span class="mv dn">$78.4</span></div>
    </div>
    <div class="ssec">
      <div class="slbl">Perguntas Rápidas</div>
      <div class="qbtns" id="qbtns"></div>
    </div>
  </div>
</div>
<script>
var PROXY = 'https://forex-proxy-05j8.onrender.com';
var PAIRS=[
  {id:'USD/JPY',price:'154.32',change:'+0.42%',dir:'up',s:'BULLISH'},
  {id:'EUR/USD',price:'1.0824',change:'-0.18%',dir:'down',s:'BEARISH'},
  {id:'GBP/USD',price:'1.2718',change:'+0.09%',dir:'up',s:'NEUTRO'},
  {id:'USD/CHF',price:'0.9041',change:'+0.31%',dir:'up',s:'BULLISH'},
  {id:'USD/CAD',price:'1.3652',change:'-0.07%',dir:'down',s:'NEUTRO'},
  {id:'NZD/USD',price:'0.6012',change:'-0.25%',dir:'down',s:'BEARISH'},
  {id:'AUD/USD',price:'0.6534',change:'-0.14%',dir:'down',s:'BEARISH'},
  {id:'XAU/USD',price:'2328.40',change:'+0.87%',dir:'up',s:'BULLISH'},
  {id:'BTC/USD',price:'67,420',change:'+2.14%',dir:'up',s:'BULLISH'}
];
var QS=[
  {e:'📊',t:'Analise o par selecionado',fn:function(){return 'Análise fundamentalista completa do '+(sel||'EUR/USD');}},
  {e:'🐂',t:'Por que está bullish?',fn:function(){return 'Por que o '+(sel||'mercado')+' está em alta? Fatores fundamentais.';}},
  {e:'🐻',t:'Por que está bearish?',fn:function(){return 'Fatores bearish do '+(sel||'mercado')+'?';}},
  {e:'🏦',t:'Política monetária',fn:function(){return 'Como a política monetária dos bancos centrais afeta o Forex agora?';}},
  {e:'📰',t:'Notícias do mercado',fn:function(){return 'Principais notícias macro movendo o Forex esta semana?';}},
  {e:'💰',t:'Melhor oportunidade',fn:function(){return 'Qual par tem melhor oportunidade fundamentalista hoje?';}}
];
var SYS='Você é o FOREX.AI, especialista em análise fundamentalista do Forex. Analisa: EUR/USD, GBP/USD, USD/JPY, USD/CHF, USD/CAD, NZD/USD, AUD/USD, XAU/USD e BTC/USD. Para cada análise: 1) Sentimento BULLISH ou BEARISH ou NEUTRO 2) Diferencial de juros entre bancos centrais 3) Dados macro: CPI, NFP, PIB, PMI 4) Contexto: risk-on vs risk-off, DXY 5) Perspectiva curto e médio prazo. Responda sempre em português brasileiro de forma clara e educativa.';
var sel=null,isRec=false,isSpeaking=false,rec=null,chatHistory=[];

function txt(t){return document.createTextNode(t);}
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}

function renderPairs(){
  var g=document.getElementById('pg');
  while(g.firstChild)g.removeChild(g.firstChild);
  PAIRS.forEach(function(p){
    var c=el('div','pc '+p.s.toLowerCase());
    c.id='c-'+p.id.replace('/','_');
    var sen=el('div','psen '+p.s); sen.appendChild(txt(p.s));
    var nm=el('div','pname'); nm.appendChild(txt(p.id));
    var pr=el('div','pprice'); pr.appendChild(txt(p.price));
    var ch=el('div','pchg '+p.dir); ch.appendChild(txt((p.dir==='up'?'▲ ':'▼ ')+p.change));
    c.appendChild(sen);c.appendChild(nm);c.appendChild(pr);c.appendChild(ch);
    c.addEventListener('click',function(){selectPair(p.id,p.s.toLowerCase());});
    g.appendChild(c);
  });
}

function renderQbtns(){
  var g=document.getElementById('qbtns');
  while(g.firstChild)g.removeChild(g.firstChild);
  QS.forEach(function(q){
    var b=el('button','qbtn');
    b.appendChild(txt(q.e+' '+q.t));
    b.addEventListener('click',function(){doAsk(q.fn());});
    g.appendChild(b);
  });
}

function welcome(){
  var m=document.getElementById('msgs');
  var d=el('div','msg'); var av=el('div','av ai'); av.appendChild(txt('🤖'));
  var b=el('div','bbl');
  var t1=el('p'); t1.appendChild(txt('Olá! Sou o FOREX.AI, seu agente de análise fundamentalista.'));
  var t2=el('p'); t2.style.marginTop='8px'; t2.appendChild(txt('Selecione um par acima ou faça uma pergunta. Clique em 🎙️ para falar.'));
  var t3=el('p'); t3.style.marginTop='8px'; t3.style.color='#64748b'; t3.style.fontSize='11px'; t3.style.fontFamily='monospace';
  t3.appendChild(txt('EUR/USD · GBP/USD · USD/JPY · USD/CHF · USD/CAD · NZD/USD · AUD/USD · XAU/USD · BTC/USD'));
  b.appendChild(t1);b.appendChild(t2);b.appendChild(t3);
  d.appendChild(av);d.appendChild(b);m.appendChild(d);
}

function selectPair(id,cls){
  sel=id;
  document.querySelectorAll('.pc').forEach(function(c){c.classList.remove('active');});
  var card=document.getElementById('c-'+id.replace('/','_'));
  if(card){card.classList.add('active');card.classList.add(cls);}
  document.getElementById('badge').textContent=id;
  doAsk('Faça uma análise fundamentalista completa e detalhada do '+id+' agora, explicando se está bullish ou bearish, os principais fatores macro e perspectivas.');
}

function doAsk(q){document.getElementById('cinp').value=q;doSend();}

function addMsg(role,text,withSpeak){
  var m=document.getElementById('msgs');
  var d=el('div','msg'+(role==='user'?' u':''));
  var av=el('div','av '+(role==='user'?'me':'ai'));
  av.appendChild(txt(role==='user'?'EU':'🤖'));
  var b=el('div','bbl');
  var lines=text.split('\n');
  lines.forEach(function(line,i){
    if(line.indexOf('**')>-1){
      var parts=line.split('**');
      parts.forEach(function(part,j){
        if(j%2===1){var s=el('strong');s.appendChild(txt(part));b.appendChild(s);}
        else if(part){b.appendChild(txt(part));}
      });
    } else {
      b.appendChild(txt(line));
    }
    if(i<lines.length-1)b.appendChild(el('br'));
  });
  if(withSpeak){
    var sb=el('button','spkbtn');
    sb.appendChild(txt('🔊 Ouvir'));
    sb.addEventListener('click',function(){doSpeak(text,sb);});
    b.appendChild(el('br'));b.appendChild(sb);
  }
  d.appendChild(av);d.appendChild(b);m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function addTyping(){
  var m=document.getElementById('msgs');
  var d=el('div','msg'); d.id='typing';
  var av=el('div','av ai'); av.appendChild(txt('🤖'));
  var b=el('div','bbl');
  var w=el('div','tdots');
  for(var i=0;i<3;i++){w.appendChild(el('div','td'));}
  b.appendChild(w);d.appendChild(av);d.appendChild(b);m.appendChild(d);m.scrollTop=m.scrollHeight;
  return d;
}

async function doSend(){
  var inp=document.getElementById('cinp');
  var text=inp.value.trim();
  if(!text)return;
  inp.value='';
  document.getElementById('sbtn').disabled=true;
  addMsg('user',text,false);
  chatHistory.push({role:'user',content:text});
  var typing=addTyping();
  try{
    var res=await fetch(PROXY+'/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:chatHistory})
    });
    var data=await res.json();
    typing.remove();
    var ai='';
    if(data.content)data.content.forEach(function(bl){if(bl.type==='text')ai+=bl.text;});
    if(!ai)ai='Desculpe, não consegui processar. Tente novamente.';
    chatHistory.push({role:'assistant',content:ai});
    addMsg('assistant',ai,true);
    doSpeak(ai,null);
  }catch(e){
    typing.remove();
    addMsg('assistant','Erro ao conectar. Verifique o servidor.',false);
    console.error(e);
  }
  document.getElementById('sbtn').disabled=false;
}

function doSpeak(text,btn){
  if(!window.speechSynthesis)return;
  if(isSpeaking){
    window.speechSynthesis.cancel();isSpeaking=false;
    document.getElementById('ttsb').classList.remove('on');
    if(btn)btn.textContent='🔊 Ouvir';
    return;
  }
  var clean=text.replace(/\*\*/g,'').replace(/\*/g,'');
  var u=new SpeechSynthesisUtterance(clean);
  u.lang='pt-BR';u.rate=1.0;
  var voices=window.speechSynthesis.getVoices();
  var pt=voices.find(function(v){return v.lang.indexOf('pt')===0;});
  if(pt)u.voice=pt;
  u.onstart=function(){isSpeaking=true;document.getElementById('ttsb').classList.add('on');if(btn)btn.textContent='⏹ Parar';};
  u.onend=function(){isSpeaking=false;document.getElementById('ttsb').classList.remove('on');if(btn)btn.textContent='🔊 Ouvir';};
  window.speechSynthesis.speak(u);
}

document.getElementById('stts').addEventListener('click',function(){
  window.speechSynthesis.cancel();isSpeaking=false;document.getElementById('ttsb').classList.remove('on');
});

function setupVoice(){
  var btn=document.getElementById('vbtn');
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){btn.style.opacity='.4';btn.style.cursor='not-allowed';return;}
  rec=new SR();rec.lang='pt-BR';rec.continuous=false;rec.interimResults=false;
  rec.onresult=function(e){document.getElementById('cinp').value=e.results[0][0].transcript;doSend();};
  rec.onend=function(){isRec=false;btn.classList.remove('rec');btn.textContent='🎙️';document.getElementById('vind').classList.remove('on');};
  rec.onerror=function(){isRec=false;btn.classList.remove('rec');btn.textContent='🎙️';document.getElementById('vind').classList.remove('on');};
  btn.addEventListener('click',function(){
    if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;document.getElementById('ttsb').classList.remove('on');}
    if(isRec){rec.stop();}else{rec.start();isRec=true;btn.classList.add('rec');btn.textContent='⏹';document.getElementById('vind').classList.add('on');}
  });
}

document.getElementById('sbtn').addEventListener('click',doSend);
document.getElementById('cinp').addEventListener('keydown',function(e){if(e.key==='Enter')doSend();});

function tick(){
  var n=new Date();
  document.getElementById('clk').textContent=
    n.getUTCHours().toString().padStart(2,'0')+':'+
    n.getUTCMinutes().toString().padStart(2,'0')+':'+
    n.getUTCSeconds().toString().padStart(2,'0')+' UTC';
}
setInterval(tick,1000);tick();
renderPairs();renderQbtns();welcome();setupVoice();
</script>
</body>
</html>
