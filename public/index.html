var QUICK = [

  {e:'📰',t:'Notícias do mercado',p:function(){return 'Quais as principais notícias macro que estão movendo o Forex esta semana?';}},
  {e:'💰',t:'Melhor oportunidade',p:function(){return 'Qual par tem a melhor oportunidade fundamentalista hoje?';}}
];

var SYSTEM = 'Você é o FOREX.AI, especialista em análise fundamentalista do Forex. Analisa: EUR/USD, GBP/USD, USD/JPY, USD/CHF, USD/CAD, NZD/USD, AUD/USD, XAU/USD e BTC/USD. Para cada análise: 1) Sentimento BULLISH ou BEARISH ou NEUTRO 2) Diferencial de juros entre bancos centrais 3) Dados macro: CPI, NFP, PIB, PMI 4) Contexto: risk-on vs risk-off, DXY 5) Perspectiva curto e médio prazo. Responda sempre em português brasileiro de forma clara e educativa.';

var sel = null, isRec = false, isSpeaking = false, rec = null, chatHistory = [];

function renderPairs() {
  var g = document.getElementById('pairsGrid');
  g.innerHTML = '';
  PAIRS.forEach(function(p) {
    var c = document.createElement('div');
    c.className = 'pair-card '+p.sentiment.toLowerCase();
    c.id = 'card-'+p.id.replace('/','-');
    var s = document.createElement('div'); s.className = 'pair-sentiment '+p.sentiment; s.textContent = p.sentiment;
    var n = document.createElement('div'); n.className = 'pair-name'; n.textContent = p.id;
    var pr = document.createElement('div'); pr.className = 'pair-price'; pr.textContent = p.price;
    var ch = document.createElement('div'); ch.className = 'pair-change '+p.dir; ch.textContent = (p.dir==='up'?'▲ ':'▼ ')+p.change;
    c.appendChild(s); c.appendChild(n); c.appendChild(pr); c.appendChild(ch);
    c.addEventListener('click', function(){selectPair(p.id);});
    g.appendChild(c);
  });
}

function renderQuick() {
  var cont = document.getElementById('quickBtns');
  cont.innerHTML = '';
  QUICK.forEach(function(q) {
    var b = document.createElement('button'); b.className = 'quick-btn'; b.textContent = q.e+' '+q.t;
    b.addEventListener('click', function(){ask(q.p());});
    cont.appendChild(b);
  });
}

function welcome() {
  var m = document.getElementById('messages');
  var d = document.createElement('div'); d.className = 'msg';
  var av = document.createElement('div'); av.className = 'msg-avatar ai'; av.textContent = '🤖';
  var b = document.createElement('div'); b.className = 'msg-bubble';
  b.innerHTML = 'Olá! Sou o <strong>FOREX.AI</strong>, seu agente de análise fundamentalista.<br><br>Selecione um par acima ou faça uma pergunta. Clique no 🎙️ para falar.<br><br><span style="color:#64748b;font-size:11px">EUR/USD · GBP/USD · USD/JPY · USD/CHF · USD/CAD · NZD/USD · AUD/USD · XAU/USD · BTC/USD</span>';
  d.appendChild(av); d.appendChild(b); m.appendChild(d);
}

function selectPair(id) {
  sel = id;
  document.querySelectorAll('.pair-card').forEach(function(c){c.classList.remove('active');});
  var card = document.getElementById('card-'+id.replace('/largely','-').replace('/','-'));
  if(card) card.classList.add('active');
  document.getElementById('selectedBadge').textContent = id;
  ask('Faça uma análise fundamentalista completa e detalhada do '+id+' agora, explicando se está bullish ou bearish, os principais fatores macro e perspectivas.');
}

function ask(q) { document.getElementById('chatInput').value = q; send(); }

function addMsg(role, text, speak) {
  var m = document.getElementById('messages');
  var d = document.createElement('div'); d.className = 'msg'+(role==='user'?' user':'');
  var av = document.createElement('div'); av.className = 'msg-avatar '+(role==='user'?'user-av':'ai'); av.textContent = role==='user'?'EU':'🤖';
  var b = document.createElement('div'); b.className = 'msg-bubble';
  var f = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  b.innerHTML = f;
  if(speak) {
    var br = document.createElement('br');
    var sb = document.createElement('button'); sb.className = 'speak-btn'; sb.textContent = '🔊 Ouvir';
    sb.addEventListener('click', function(){speakText(text, sb);});
    b.appendChild(br); b.appendChild(sb);
  }
  d.appendChild(av); d.appendChild(b); m.appendChild(d); m.scrollTop = m.scrollHeight;
}

function addTyping() {
  var m = document.getElementById('messages');
  var d = document.createElement('div'); d.className = 'msg'; d.id = 'typing';
  var av = document.createElement('div'); av.className = 'msg-avatar ai'; av.textContent = '🤖';
  var b = document.createElement('div'); b.className = 'msg-bubble';
  var w = document.createElement('div'); w.className = 'typing-wrap';
  for(var i=0;i<3;i++){var dot=document.createElement('div');dot.className='typing-dot';w.appendChild(dot);}
  b.appendChild(w); d.appendChild(av); d.appendChild(b); m.appendChild(d); m.scrollTop = m.scrollHeight;
  return d;
}

async function send() {
  var inp = document.getElementById('chatInput');
  var text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text, false);
  chatHistory.push({role:'user', content:text});
  var typing = addTyping();
  try {
    var res = await fetch(PROXY_URL+'/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:chatHistory})
    });
    var data = await res.json();
    typing.remove();
    var ai = '';
    if(data.content) data.content.forEach(function(b){if(b.type==='text') ai+=b.text;});
    if(!ai) ai = 'Desculpe, não consegui processar. Tente novamente.';
    chatHistory.push({role:'assistant',content:ai});
    addMsg('assistant', ai, true);
    speakText(ai, null);
  } catch(e) {
    typing.remove();
    addMsg('assistant','Erro ao conectar. Tente novamente.',false);
  }
  document.getElementById('sendBtn').disabled = false;
}

function speakText(text, btn) {
  if(!window.speechSynthesis) return;
  if(isSpeaking) {
    window.speechSynthesis.cancel(); isSpeaking = false;
    document.getElementById('ttsBar').classList.remove('active');
    if(btn){btn.textContent='🔊 Ouvir';}
    return;
  }
  var clean = text.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').replace(/\*/g,'');
  var u = new SpeechSynthesisUtterance(clean);
  u.lang = 'pt-BR'; u.rate = 1.0;
  var voices = window.speechSynthesis.getVoices();
  var pt = voices.find(function(v){return v.lang.indexOf('pt')===0;});
  if(pt) u.voice = pt;
  u.onstart = function(){isSpeaking=true;document.getElementById('ttsBar').classList.add('active');if(btn)btn.textContent='⏹ Parar';};
  u.onend = function(){isSpeaking=false;document.getElementById('ttsBar').classList.remove('active');if(btn)btn.textContent='🔊 Ouvir';};
  window.speechSynthesis.speak(u);
}

document.getElementById('stopTts').addEventListener('click',function(){
  window.speechSynthesis.cancel(); isSpeaking=false; document.getElementById('ttsBar').classList.remove('active');
});

function setupVoice() {
  var btn = document.getElementById('voiceBtn');
  var SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){btn.style.opacity='.4';btn.style.cursor='not-allowed';return;}
  rec = new SR(); rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false;
  rec.onresult=function(e){document.getElementById('chatInput').value=e.results[0][0].transcript;send();};
  rec.onend=function(){isRec=false;btn.classList.remove('recording');btn.textContent='🎙️';document.getElementById('voiceIndicator').classList.remove('active');};
  rec.onerror=function(){isRec=false;btn.classList.remove('recording');btn.textContent='🎙️';document.getElementById('voiceIndicator').classList.remove('active');};
  btn.addEventListener('click',function(){
    if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;document.getElementById('ttsBar').classList.remove('active');}
    if(isRec){rec.stop();}else{rec.start();isRec=true;btn.classList.add('recording');btn.textContent='⏹';document.getElementById('voiceIndicator').classList.add('active');}
  });
}

document.getElementById('sendBtn').addEventListener('click',send);
document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter')send();});

function tick(){
  var n=new Date();
  var h=n.getUTCHours().toString().padStart(2,'0');
  var m=n.getUTCMinutes().toString().padStart(2,'0');
  var s=n.getUTCSeconds().toString().padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m+':'+s+' UTC';
}
setInterval(tick,1000); tick();
renderPairs(); renderQuick(); welcome(); setupVoice();
